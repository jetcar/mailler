services:
  postgres:
    image: 'postgres:15.5'
    container_name: mailler-postgres
    env_file:
      - .env.test
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d mailler" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mailler-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mailler-backend
    env_file:
      - .env.test
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
      - "25:25" # SMTP - Standard mail transfer
      - "587:587" # SMTP Submission - Mail clients (STARTTLS)
      - "465:465" # SMTPS - SMTP over SSL
    volumes:
      # Mount SSL certificates for SMTP
      - ./certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mailler-network

  test-oidc-provider:
    build:
      context: ./test-oidc-provider
      dockerfile: Dockerfile
    container_name: test-oidc-provider
    env_file:
      - .env.test
    environment:
      PORT: 9000
    ports:
      - "9000:9000"
    restart: unless-stopped
    networks:
      - mailler-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  haproxy:
    image: haproxy:3.1.2
    container_name: mailler-haproxy
    ports:
      - "80:80"
      - "443:443"
      - "8404:8404" # Stats page
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./certs:/usr/local/etc/haproxy/certs:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mailler-network

volumes:
  postgres_data:
    driver: local

networks:
  mailler-network:
    driver: bridge
