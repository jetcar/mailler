global
    log stdout format raw local0
    maxconn 4096
    
defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5000
    timeout client  300000    # 5 minutes for SSE connections
    timeout server  300000    # 5 minutes for long-running operations

resolvers docker
    nameserver dns 127.0.0.11:53
    accepted_payload_size 8192
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 10s
    hold other 10s
    hold refused 10s
    hold nx 10s
    hold timeout 10s
    hold obsolete 10s

frontend https_frontend
    bind *:443 ssl crt /usr/local/etc/haproxy/certs/localhost.pem
    mode http
    
    # Add headers for proxy
    http-request set-header X-Forwarded-For %[src]
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Real-IP %[src]
    
    # Virtual paths for services
    acl is_mailler path_beg /mailler
    acl is_mailler_callback path_beg /mailler/oauth2/authorize
    acl is_test_openidc path_beg /test_openidc
    
    # Convenience shortcuts (route directly to backend without /mailler prefix)
    acl is_auth path_beg /auth
    acl is_api path_beg /api
    acl is_webmail path_beg /webmail
    
    # Route to backends
    use_backend mailler_backend_no_strip if is_mailler_callback
    use_backend mailler_backend if is_mailler
    use_backend mailler_backend_no_strip if is_auth
    use_backend mailler_backend_no_strip if is_api
    use_backend mailler_backend_no_strip if is_webmail
    use_backend test_oidc_provider if is_test_openidc
    
    # Everything else to backend (serves frontend static files)
    default_backend mailler_backend_no_strip

# Also listen on HTTP and redirect to HTTPS
frontend http_frontend
    bind *:80
    mode http
    redirect scheme https code 301 if !{ ssl_fc }

backend mailler_backend
    mode http
    balance roundrobin
    option httpchk GET /health
    
    # Strip /mailler prefix before forwarding to backend
    http-request set-path %[path,regsub(^/mailler,)]
    
    # Backend running inside Docker network
    server backend1 backend:3000 check resolvers docker init-addr libc,none resolve-prefer ipv4

backend mailler_backend_no_strip
    mode http
    balance roundrobin
    option httpchk GET /health
    
    # No path rewriting - forward /auth and /api as-is
    
    # Backend running inside Docker network
    server backend1 backend:3000 check resolvers docker init-addr libc,none resolve-prefer ipv4

backend test_oidc_provider
    mode http
    balance roundrobin
    option httpchk GET /health
    
    # Strip /test_openidc prefix before forwarding to OIDC provider
    http-request set-path %[path,regsub(^/test_openidc,)]
    
    # Test OIDC provider running inside Docker network
    server oidc1 test-oidc-provider:9000 check resolvers docker init-addr libc,none resolve-prefer ipv4
    
